<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selera - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sacramento&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-logo { font-family: 'Sacramento', cursive; }
        
        /* Bubble Chat Custom */
        .speech-bubble {
            position: relative;
            background: #ffffff;
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .speech-bubble::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen flex bg-white overflow-hidden">

    <div class="w-full lg:w-1/2 bg-[#fdfefb] flex flex-col p-8 lg:p-12 relative overflow-y-auto justify-center">
        
        <div class="flex flex-col items-start mb-12">
            <div class="relative flex items-center">
                <img src="assets/images/Selera (2).png" alt="Logo Selera" class="h-12 w-auto object-contain">
                <img src="assets/images/kupukupuungu.png" alt="Heart" class="w-4 h-4 ml-2 mb-4">
            </div>
            <p class="text-[10px] text-gray-500 mt-1 flex items-center gap-1">
                Tempat terbaik untuk dirimu sendiri <img src="assets/images/daunsemanggi.pngx" class="w-3 h-3" alt="">
            </p>
        </div>

        <div class="m-auto w-full max-w-md flex flex-col">
            
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-[#2f4f3e] flex items-center justify-center gap-2 mb-2">
                    LOGIN <img src="assets/images/daunjatuh.png" class="w-6 h-6" alt="">
                </h1>
                <p class="text-sm text-gray-500">Masuk untuk melanjutkan<br>perjalanan bersama Kira ✨</p>
            </div>

            <form class="flex flex-col gap-4" onsubmit="event.preventDefault();">
                <div class="flex items-center bg-white border border-gray-200 rounded-xl px-4 py-3 focus-within:border-pink-300 focus-within:ring-2 focus-within:ring-pink-100 focus-within:-translate-y-1 focus-within:shadow-md transition-all duration-300 shadow-sm">
                    <i data-lucide="mail" class="w-5 h-5 text-pink-400 mr-3"></i>
                    <input type="email" id="loginEmail" placeholder="Masukkan Email kamu" class="flex-1 bg-transparent outline-none text-sm text-gray-700 placeholder-gray-400" required>
                </div>

                <div class="flex items-center bg-white border border-gray-200 rounded-xl px-4 py-3 focus-within:border-pink-300 focus-within:ring-2 focus-within:ring-pink-100 focus-within:-translate-y-1 focus-within:shadow-md transition-all duration-300 shadow-sm">
                    <i data-lucide="lock" class="w-5 h-5 text-pink-400 mr-3"></i>
                    <input type="password" id="loginPassword" placeholder="Password" class="flex-1 bg-transparent outline-none text-sm text-gray-700 placeholder-gray-400" required>
                    <button type="button" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="flex items-center justify-between mt-1 mb-2 px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-300 text-pink-400 focus:ring-pink-300 accent-pink-400">
                        <span class="text-xs text-gray-600 group-hover:text-gray-800 transition-colors">Ingat saya</span>
                    </label>
                    <a href="#" class="text-xs text-pink-500 hover:text-pink-600 font-medium hover:underline">Lupa password?</a>
                </div>

                <button type="button" onclick="prosesLogin()" class="w-full bg-[#f98ab3] hover:bg-[#f074a1] text-white font-bold py-3.5 rounded-xl shadow-md transition-transform hover:scale-[1.02] flex items-center justify-center gap-2">
                    Masuk <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </form>

            <p class="text-xs text-center text-gray-500 mt-8">
                Belum punya akun? <a href="register.html" class="text-pink-500 hover:text-pink-600 font-semibold hover:underline">Daftar di sini</a>
            </p>
        </div>
    </div>

    <div class="hidden lg:flex w-1/2 bg-[#e6f3e6] border-l border-gray-100 relative overflow-hidden items-center justify-center">
        <img src="assets/bg-awan.png" class="absolute top-0 left-0 w-full h-full object-cover opacity-50 z-0" alt="">
        <img src="assets/bg-rumput.png" class="absolute bottom-0 left-0 w-full object-contain z-10" alt="">
        
        <div class="relative z-20 flex flex-col items-center">
            <div class="absolute -top-16 -right-16 z-30 animate-bounce">
                <div class="speech-bubble text-center border border-pink-100">
                    <p class="text-xs font-medium text-gray-700">
                        Hai! Aku Kira <span class="text-pink-400">♥</span><br>
                        Yuk, lanjutkan<br>perjalanan kita<br>bersama! <img src="assets/ikon-daun.png" class="w-3 h-3 inline" alt="">
                    </p>
                </div>
            </div>
            
            <img src="assets/images/m.menyapa.png" alt="Kira Mascot" class="w-[450px] object-contain drop-shadow-xl hover:scale-105 transition-transform duration-500">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. KONEKSI SUPABASE
        const supabaseUrl = 'https://cyxmsawygqrunhinfvyj.supabase.co'; // Ganti dengan URL Supabase aslimu
        const supabaseKey = 'sb_publishable_3cxazIXr7B0ypa2fN6YVxw_jQyA6TDY';        // Ganti dengan anon key Supabase aslimu
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Inisialisasi Ikon Lucide
        lucide.createIcons();

        // 2. LOGIKA LOGIN
        async function prosesLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            // Validasi input kosong
            if (!email || !password) {
                alert('Email dan password harus diisi lengkap yaa! 🌸');
                return;
            }

            // Memproses login ke Supabase
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                console.error('Login gagal:', error.message);
                alert('Gagal masuk: ' + error.message);
            } else {
                alert('Haii, berhasil masuk! Selamat datang kembali 🥰🌸');
                
                // Dialihkan ke halaman utama dashboard aplikasi kamu tempat To-do List berada
                // Sesuaikan 'dashboard.html' dengan nama file halaman utama to-do list kamu ya!
                window.location.href = 'homepage.html'; 
            }
        }
    </script>
</body>
</html>
